# XcodeGen project spec — run `brew install xcodegen && xcodegen generate`
# from this directory to produce AccessMate.xcodeproj.

name: AccessMate
options:
  bundleIdPrefix: com.accessmate
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: '5.10'
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: '0.4.0'
    CURRENT_PROJECT_VERSION: '1'

targets:
  AccessMate:
    type: application
    platform: iOS
    sources:
      - path: AccessMate
        excludes:
          - 'Resources/operators/*.json'
          - 'Resources/scenarios/*.json'
      - path: AccessMate/Resources
        type: folder
    info:
      path: AccessMate/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ''
        CFBundleDisplayName: AccessMate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAccessibilityUsageDescription: 'AccessMate uses accessibility services to help you carry your access needs across journeys.'
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.accessmate.AccessMate
        TARGETED_DEVICE_FAMILY: '1,2'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: 'NO'

  AccessMateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AccessMateTests
    dependencies:
      - target: AccessMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.accessmate.AccessMateTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/AccessMate.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AccessMate

schemes:
  AccessMate:
    build:
      targets:
        AccessMate: all
        AccessMateTests: [test]
    test:
      targets:
        - AccessMateTests
    run:
      config: Debug
    archive:
      config: Release
